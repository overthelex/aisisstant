services:
  postgres:
    image: postgres:16-alpine
    container_name: aisisstant-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aisisstant
      POSTGRES_USER: aisisstant
      POSTGRES_PASSWORD: "${DB_PASSWORD:-aisisstant_dev}"
    ports:
      - "127.0.0.1:5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisisstant"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
