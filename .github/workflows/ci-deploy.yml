name: CI & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    name: Lint & Test
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install --user --break-system-packages -r requirements.txt pytest pytest-asyncio

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short

  deploy:
    name: Deploy
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: self-hosted
    env:
      XDG_RUNTIME_DIR: /run/user/1000
      DBUS_SESSION_BUS_ADDRESS: unix:path=/run/user/1000/bus
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install --user --break-system-packages -r requirements.txt

      - name: Copy GNOME extension
        run: |
          EXT_DIR="$HOME/.local/share/gnome-shell/extensions/aisisstant-tracker@vovkes"
          mkdir -p "$EXT_DIR"
          cp gnome-extension/extension.js "$EXT_DIR/"
          cp gnome-extension/metadata.json "$EXT_DIR/"

      - name: Copy systemd service
        run: |
          mkdir -p "$HOME/.config/systemd/user"
          cp systemd/aisisstant.service "$HOME/.config/systemd/user/"
          systemctl --user daemon-reload

      - name: Ensure PostgreSQL is running
        run: docker compose up -d

      - name: Restart service
        run: |
          systemctl --user enable aisisstant.service
          systemctl --user restart aisisstant.service

      - name: Health check
        run: |
          sleep 3
          systemctl --user is-active aisisstant.service

  release:
    name: Release
    needs: deploy
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CalVer tag
        id: tag
        run: |
          DATE_TAG=$(date +%Y.%m.%d)
          EXISTING=$(git tag -l "${DATE_TAG}*" | wc -l)
          if [ "$EXISTING" -eq 0 ]; then
            TAG="$DATE_TAG"
          else
            TAG="${DATE_TAG}.${EXISTING}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "deb_version=${TAG}-1" >> "$GITHUB_OUTPUT"
          echo "Generated tag: $TAG"

      - name: Sync version files to tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          DEB_VERSION="${{ steps.tag.outputs.deb_version }}"

          # pyproject.toml
          sed -i -E "s/^version = \".*\"/version = \"${TAG}\"/" pyproject.toml

          # aisisstant-setup VERSION constant
          sed -i -E "s/^VERSION = \".*\"/VERSION = \"${TAG}\"/" aisisstant-setup

          # debian/changelog — prepend new entry
          DATE_RFC=$(date -R)
          cat > debian/changelog.new <<EOF
          aisisstant (${DEB_VERSION}) unstable; urgency=medium

            * Automated release from master @ ${GITHUB_SHA::7}

           -- CI <ci@aisisstant.local>  ${DATE_RFC}

          EOF
          cat debian/changelog >> debian/changelog.new
          mv debian/changelog.new debian/changelog

      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p dist
          mv ../aisisstant_*.deb ../aisisstant_*.buildinfo ../aisisstant_*.changes dist/ || true
          ls -la dist/

      - name: Create git tag
        run: |
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

      - name: Create GitHub release with .deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.tag.outputs.tag }} \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes \
            dist/aisisstant_*.deb
